        <script>
            // ===== FUNÇÕES GLOBAIS PARA A API DE PLACAS =====

            // 🎯 Função para aplicar máscara de placa
            function aplicarMascaraPlaca(valor) {
                valor = valor.toUpperCase().replace(/[^A-Z0-9]/g, '');
                if (valor.length <= 3) {
                    return valor;
                }
                if (valor.length <= 7) {
                    return valor.substring(0, 3) + '-' + valor.substring(3);
                }
                return valor.substring(0, 3) + '-' + valor.substring(3, 8);
            }

            // 📋 Valida formato de placa
            function validarFormatoPlaca(placa) {
                const placaLimpa = placa.replace(/[^A-Z0-9]/g, '');
                if (placaLimpa.length !== 7) {
                    return false;
                }
                if (!/^[A-Z]{3}/.test(placaLimpa)) {
                    return false;
                }
                const ultimosQuatro = placaLimpa.substring(3);
                if (!/^[0-9]{4}$|^[0-9]{3}[A-Z]$/.test(ultimosQuatro)) {
                    return false;
                }
                return true;
            }

            // 🔎 Valida formulário
            function validarFormulario() {
                const placaInput = document.getElementById("placa");
                const form = document.querySelector(".card__form");
                const checkboxes = form.querySelectorAll("input[type='checkbox'][data-required]");
                const btnBuscar = document.getElementById("btnBuscar");

                const placaValida = placaInput.value.trim().length > 0;
                const checksMarcados = [...checkboxes].every(chk => chk.checked);

                btnBuscar.disabled = !(placaValida && checksMarcados);
            }

            // 🚀 Submit com validação de placa e chamada à API
            function handleSubmit(event) {
                event.preventDefault();

                const form = event.target;
                const placaInput = document.getElementById("placa");
                const btnBuscar = document.getElementById("btnBuscar");
                const placaValor = placaInput.value.trim();

                // Validar formato de placa
                if (!validarFormatoPlaca(placaValor)) {
                    Swal.fire({
                        title: 'Placa Inválida',
                        text: 'Por favor, digite uma placa válida no formato ABC-1234 ou ABC1D34 (Mercosul).',
                        icon: 'warning',
                        confirmButtonText: 'OK',
                        customClass: {
                            confirmButton: 'swal-btn-custom'
                        },
                        didOpen: () => {
                            document.querySelectorAll("button").forEach(btn => {
                                btn.disabled = false;
                            });
                            btnBuscar.classList.remove("loading");
                        }
                    });
                    return false;
                }

                // Ativa loader no botão principal
                btnBuscar.classList.add("loading");

                // Desabilita TODOS os botões da tela
                document.querySelectorAll("button").forEach(btn => {
                    btn.disabled = true;
                });

                // Consultar API de placas
                consultarPlaca(placaValor, form);

                return false;
            }

            // 🔍 Função para consultar a API de placas
            // 🔍 Função para consultar a API de placas
            function consultarPlaca(placa, form) {
                const placaLimpa = placa.replace(/[^A-Z0-9]/g, '');
                const apiUrl = `/api/placas?placa=${placaLimpa}`;
                const btnBuscar = document.getElementById("btnBuscar");
                // Flag para garantir que apenas uma ação seja executada (modal OU redirecionamento)
                let acaoExecutada = false;

                function finalizarLoader() {
                    btnBuscar.classList.remove("loading");
                    document.querySelectorAll("button").forEach(btn => { btn.disabled = false; });
                }

                // Timeout de 5 segundos: se a API demorar, vai direto para débitos
                const timeoutId = setTimeout(() => {
                    if (acaoExecutada) return;
                    acaoExecutada = true;
                    console.warn('Timeout na consulta da API de placas.');
                    finalizarLoader();
                    prosseguirParaDebitos(placaLimpa);
                }, 5000);

                fetch(apiUrl, { method: 'GET', headers: { 'Accept': 'application/json' } })
                    .then(response => {
                        clearTimeout(timeoutId);
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return response.json();
                    })
                    .then(data => {
                        if (acaoExecutada) return;
                        acaoExecutada = true;
                        finalizarLoader();
                        // Só exibe modal se a API retornou dados REAIS e COMPLETOS do veículo
                        if (
                            data.status === 'success' &&
                            data.dados &&
                            data.dados.Marca &&
                            data.dados.Modelo &&
                            data.dados.Marca.trim() !== '' &&
                            data.dados.Modelo.trim() !== ''
                        ) {
                            console.log('Veículo encontrado:', data.dados);
                            exibirModalVeiculo(data.dados, placaLimpa);
                        } else {
                            // Placa não encontrada ou dados inválidos → pede CPF/telefone antes
                            console.warn('Placa não encontrada. Exibindo modal de lead.');
                            prosseguirParaDebitos(placaLimpa);
                        }
                    })
                    .catch(error => {
                        clearTimeout(timeoutId);
                        if (acaoExecutada) return;
                        acaoExecutada = true;
                        console.error('Erro ao consultar API:', error);
                        finalizarLoader();
                        prosseguirParaDebitos(placaLimpa);
                    });
            }

            // 🎪 Função para exibir modal de veículo encontrado
            function exibirModalVeiculo(dados, placa) {
                // Criar overlay se não existir
                let overlay = document.getElementById('vehicleModalOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'vehicleModalOverlay';
                    overlay.className = 'vehicle-modal-overlay';
                    overlay.innerHTML = `
                        <div class="vehicle-modal-content">
                            <div class="vehicle-modal-header">
                                <h2>Veículo Encontrado</h2>
                                <p>Confirme os dados abaixo</p>
                            </div>
                            
                            <div class="vehicle-modal-data">
                                <div class="vehicle-modal-row">
                                    <span class="vehicle-modal-label">Placa</span>
                                    <span class="vehicle-modal-value" id="modalPlaca">-</span>
                                </div>
                                <div class="vehicle-modal-row">
                                    <span class="vehicle-modal-label">Marca</span>
                                    <span class="vehicle-modal-value" id="modalMarca">-</span>
                                </div>
                                <div class="vehicle-modal-row">
                                    <span class="vehicle-modal-label">Modelo</span>
                                    <span class="vehicle-modal-value" id="modalModelo">-</span>
                                </div>
                                <div class="vehicle-modal-row">
                                    <span class="vehicle-modal-label">Ano</span>
                                    <span class="vehicle-modal-value" id="modalAno">-</span>
                                </div>
                                <div class="vehicle-modal-row">
                                    <span class="vehicle-modal-label">Cor</span>
                                    <span class="vehicle-modal-value" id="modalCor">-</span>
                                </div>
                            </div>
                            
                            <button class="vehicle-modal-btn vehicle-modal-btn-confirm" id="vehicleYes">✓ Sim, este é meu veículo</button>
                            <button class="vehicle-modal-btn vehicle-modal-btn-cancel" id="vehicleNo">✕ Não, redigitar placa</button>
                        </div>
                    `;
                    document.body.appendChild(overlay);
                }

                // Preencher dados do veículo
                document.getElementById('modalMarca').textContent = dados.Marca || '-';
                document.getElementById('modalModelo').textContent = dados.Modelo || '-';
                document.getElementById('modalAno').textContent = dados.Ano || '-';
                document.getElementById('modalCor').textContent = dados.Cor || '-';
                document.getElementById('modalPlaca').textContent = placa;

                // Mostrar modal
                overlay.classList.add('active');

                // Eventos dos botões
                document.getElementById('vehicleYes').onclick = () => {
                    overlay.classList.remove('active');
                    prosseguirParaDebitos(placa);
                };

                document.getElementById('vehicleNo').onclick = () => {
                    overlay.classList.remove('active');
                    // Limpar input e permitir nova digitação
                    document.getElementById('placa').value = '';
                    document.getElementById('placa').focus();
                    validarFormulario();
                };
            }
            // ✅ Função para prosseguir para débitos
            function prosseguirParaDebitos(placa) {
                const placaLimpa = placa.replace(/[^A-Z0-9]/g, '');
                
                // Gerar data/hora atual no formato DD/MM/YYYY - HH:MM
                const agora = new Date();
                const dia = String(agora.getDate()).padStart(2, '0');
                const mes = String(agora.getMonth() + 1).padStart(2, '0');
                const ano = agora.getFullYear();
                const hora = String(agora.getHours()).padStart(2, '0');
                const minuto = String(agora.getMinutes()).padStart(2, '0');
                const dataHora = `${dia}/${mes}/${ano} - ${hora}:${minuto}`;
                
                // Codificar data/hora para URL
                const dataHoraEncoded = encodeURIComponent(dataHora);
                
                window.location.href = `debitos.html?placa=${placaLimpa}&dataHora=${dataHoraEncoded}`;
            }

            // ===== INICIALIZAÇÃO DO FORMULÁRIO =====
            document.addEventListener("DOMContentLoaded", function () {
                const form = document.querySelector(".card__form");
                const placaInput = document.getElementById("placa");
                const checkboxes = form.querySelectorAll("input[type='checkbox'][data-required]");
                const btnBuscar = document.getElementById("btnBuscar");

                // Eventos de validação
                placaInput.addEventListener("input", function (e) {
                    const valor = e.target.value;
                    const mascarado = aplicarMascaraPlaca(valor);
                    e.target.value = mascarado;
                    validarFormulario();
                });

                checkboxes.forEach(chk =>
                    chk.addEventListener("change", validarFormulario)
                );

                // Event listener para o botão de buscar
                btnBuscar.addEventListener("click", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    handleSubmit(e);
                });
            });
        </script>
